<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiddu's Quest: Ultimate Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --sky-top: #2b0f54;
            --sky-bottom: #ab274f;
            --menu-bg: #101024;
            --border-light: #f8f8f8;
            --border-shadow: #505050;
            --text-main: #f8f8f8;
            --text-gold: #f8d820;
            --text-pink: #ff6eb4;
            --text-cyan: #00ffff;
            --text-red: #ff3333;
        }

        body {
            font-family: 'VT323', monospace;
            margin: 0;
            padding: 0;
            background: linear-gradient(to bottom, var(--sky-top), var(--sky-bottom));
            background-attachment: fixed;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            user-select: none;
            overflow-x: hidden;
        }

        /* SCROLLING 16-BIT STARFIELD */
        .scrolling-bg {
            position: fixed;
            top: 0; left: 0; width: 200%; height: 200%;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 40px 70px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 90px 40px, #ffffff, rgba(0,0,0,0));
            background-size: 100px 100px;
            animation: scrollStars 60s linear infinite;
            z-index: 0;
            opacity: 0.5;
            pointer-events: none;
        }
        @keyframes scrollStars {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100px, -100px); }
        }

        /* CRT TV SCANLINE OVERLAY */
        .crt-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            z-index: 999;
            pointer-events: none;
            animation: flicker 0.15s infinite;
        }
        @keyframes flicker {
            0% { opacity: 0.95; }
            100% { opacity: 1; }
        }

        /* Header UI */
        header {
            text-align: center;
            margin: 30px 0 20px 0;
            z-index: 10;
        }
        h1 {
            font-family: 'Press Start 2P', cursive;
            font-size: 1.8rem;
            color: var(--text-gold);
            text-shadow: 3px 3px 0px #000, 0 0 10px rgba(248, 216, 32, 0.5);
            margin: 0 0 10px 0;
            line-height: 1.5;
            animation: floatUI 3s steps(4) infinite alternate;
        }

        /* CLASSIC BEVELED JRPG MENUS */
        .game-screen {
            display: grid;
            grid-template-columns: 220px 1fr;
            grid-template-rows: auto auto;
            gap: 15px;
            width: 95%;
            max-width: 750px;
            z-index: 10;
            margin-bottom: 40px;
        }

        @media (max-width: 650px) { .game-screen { grid-template-columns: 1fr; } }

        .retro-panel {
            background-color: var(--menu-bg);
            border: 4px solid #000;
            box-shadow: inset 4px 4px 0px var(--border-light), inset -4px -4px 0px var(--border-shadow), 6px 6px 0px rgba(0,0,0,0.6);
            padding: 20px;
            image-rendering: pixelated;
        }

        /* IDLE ANIMATIONS FOR UI */
        .idle-bob { animation: floatUI 2s steps(2) infinite alternate; }
        @keyframes floatUI {
            0% { transform: translateY(0px); }
            100% { transform: translateY(4px); }
        }

        /* Panel Shake Animation */
        .shake { animation: shakeAnim 0.3s steps(4); }
        @keyframes shakeAnim {
            0% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            50% { transform: translateX(8px); }
            75% { transform: translateX(-8px); }
            100% { transform: translateX(0); }
        }

        /* Character Portrait */
        .portrait-box {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }
        .portrait-frame {
            width: 160px; height: 160px;
            border: 4px solid #000;
            box-shadow: inset 4px 4px 0px #fff, inset -4px -4px 0px #888, 0 0 15px rgba(255, 110, 180, 0.5);
            background: #000;
            overflow: hidden;
        }
        .portrait-frame img {
            width: 100%; height: 100%; object-fit: cover;
            image-rendering: pixelated; 
            filter: contrast(1.3) saturate(1.2);
            transition: filter 0.2s;
        }

        /* Dialogue Box */
        .dialogue-box {
            position: relative;
            min-height: 110px;
            font-size: 1.8rem;
            line-height: 1.3;
            text-shadow: 2px 2px 0px #000;
            display: flex;
            align-items: flex-start;
            padding-right: 20px;
            border-left: 6px solid var(--text-pink);
        }
        .blinking-arrow {
            position: absolute;
            bottom: 15px; right: 15px;
            font-family: 'Press Start 2P', cursive;
            font-size: 1rem;
            color: var(--text-gold);
            animation: blink 0.8s step-end infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }

        /* Action Menu (De-Clustered Commands) */
        .action-menu {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .retro-btn {
            background: rgba(0, 0, 0, 0.5);
            color: var(--text-main);
            border: 2px solid var(--border-shadow);
            border-radius: 4px;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.85rem;
            text-align: left;
            cursor: pointer;
            padding: 14px 15px;
            position: relative;
            text-shadow: 2px 2px 0px #000;
            transition: transform 0.1s steps(2), border-color 0.1s;
        }
        .retro-btn:hover {
            color: var(--text-gold);
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--text-pink);
            transform: translateX(5px);
        }
        .retro-btn:active { transform: translateY(4px) translateX(5px); }
        .retro-btn:hover::before {
            content: '▶'; 
            position: absolute; 
            left: -18px; 
            top: 13px;
            color: var(--text-pink);
            animation: blink 0.5s step-end infinite;
        }

        /* Stats & Mood Section */
        .stats-box { font-size: 1.5rem; text-shadow: 2px 2px 0px #000; }
        .stat-title {
            font-family: 'Press Start 2P', cursive;
            color: var(--text-cyan);
            margin-bottom: 20px;
            font-size: 1rem;
            border-bottom: 4px dotted rgba(255,255,255,0.3);
            padding-bottom: 10px;
        }

        .mood-grid {
            display: flex;
            gap: 12px; margin: 15px 0; flex-wrap: wrap;
        }
        .mood-sprite {
            font-size: 2rem; cursor: pointer;
            filter: grayscale(1);
            transition: transform 0.1s steps(2);
        }
        .mood-sprite:hover, .mood-sprite.active {
            filter: grayscale(0);
            transform: translateY(-6px);
            text-shadow: 0 0 10px rgba(255,255,255,0.8);
        }

        /* Pixel Explosion Animation */
        .pixel-spark {
            position: absolute;
            width: 10px; height: 10px;
            background-color: var(--text-pink);
            pointer-events: none;
            z-index: 1000;
            box-shadow: inset 2px 2px 0 #fff;
            animation: pixelPoof 0.4s steps(4) forwards; 
        }
        @keyframes pixelPoof {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(0); opacity: 0; }
        }

        /* Floating Combat Text */
        .floating-text {
            position: absolute;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.9rem;
            font-weight: bold;
            pointer-events: none;
            z-index: 1001;
            text-shadow: 2px 2px 0px #000, -1px -1px 0 #000, 1px -1px 0 #000;
            animation: floatText 1.2s steps(8) forwards;
        }
        @keyframes floatText {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-40px); opacity: 0; }
        }

        /* --- SECRET BUTTON & EXPLOSION OVERLAY --- */
        #secret-btn {
            position: fixed;
            bottom: 10px; 
            right: 15px;
            background: none; 
            border: none;
            color: var(--text-pink);
            font-size: 1.5rem;
            opacity: 0.15;
            cursor: pointer;
            z-index: 1000;
            font-family: 'Press Start 2P', cursive;
            text-shadow: 2px 2px 0 #000;
        }
        #secret-btn:hover { opacity: 1; }

        #secret-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.85);
            z-index: 9999;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #secret-text {
            font-family: 'Press Start 2P', cursive;
            font-size: clamp(3rem, 8vw, 6rem);
            color: var(--text-pink);
            text-shadow: 6px 6px 0px #000, 0 0 30px var(--text-pink);
            animation: pulseHeart 1s infinite alternate;
            text-align: center;
            line-height: 1.5;
        }

        @keyframes pulseHeart {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        .giant-pixel {
            position: absolute;
            width: 20px; height: 20px;
            background-color: var(--text-pink);
            pointer-events: none;
            z-index: 10000;
            box-shadow: inset 4px 4px 0 rgba(255,255,255,0.6), 2px 2px 0 #000;
            animation: explodeGiant 1.5s steps(6) forwards;
        }

        @keyframes explodeGiant {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(0); opacity: 0; }
        }
    </style>
</head>
<body>

<div class="scrolling-bg"></div>
<div class="crt-overlay"></div>

<header>
    <h1>TIDDU'S QUEST<br><span style="color: var(--text-pink); font-size: 1rem;">Lv. 99 BUDDHU</span></h1>
</header>

<div class="game-screen">
    
    <div class="retro-panel portrait-box" id="portrait-panel">
        <div class="portrait-frame idle-bob">
            <img src="8.jpeg" id="gfPhoto" alt="Tiddu Sprite">
        </div>
    </div>

    <div class="retro-panel dialogue-box">
        <div id="dialogue-text">* Wild TIDDU appeared!<br>* What will You do?</div>
        <div class="blinking-arrow">▼</div>
    </div>

    <div class="retro-panel action-menu">
        <div class="stat-title">COMMANDS</div>
        <button class="retro-btn" onclick="executeCommand('TALK', event)">INTERACT</button>
        <button class="retro-btn" onclick="executeCommand('SCAN', event)">TIDDU'S MOOD</button>
    </div>

    <div class="retro-panel stats-box">
        <div class="stat-title">PARTY STATS</div>
        
        <div style="margin-bottom: 25px;">
            <span style="color: var(--text-gold);">TIME IN PARTY:</span><br>
            <span id="time-counter" style="font-family: 'Press Start 2P', cursive; font-size: 0.8rem; color: var(--text-pink); display: block; margin-top: 10px;">00:00:00:00</span>
        </div>

        <div>
            <span style="color: var(--text-gold);">SET STATUS:</span>
            <div class="mood-grid">
                <span class="mood-sprite" onclick="setStatus(event, this, 'STATUS: CHARMED 😍', 'sepia(1) hue-rotate(280deg) saturate(3)', '+CHARMED', 'var(--text-pink)')">😍</span>
                <span class="mood-sprite" onclick="setStatus(event, this, 'STATUS: ANNOYED 🙄', 'sepia(1) hue-rotate(180deg) saturate(2)', '-PATIENCE', 'var(--text-cyan)')">🙄</span>
                <span class="mood-sprite" onclick="setStatus(event, this, 'STATUS: ANGRY 😡', 'sepia(1) hue-rotate(330deg) saturate(5)', '+ANGRY', 'var(--text-red)')">😡</span>
                <span class="mood-sprite" onclick="setStatus(event, this, 'STATUS: HUNGRY 🤤', 'sepia(1) hue-rotate(10deg) saturate(3)', '-HP (STARVING)', 'var(--text-gold)')">🤤</span>
            </div>
            <div id="status-text" style="color: var(--text-cyan); font-weight: bold; font-family: 'Press Start 2P', cursive; font-size: 0.8rem; margin-top: 10px;">[ NO STATUS ]</div>
        </div>
    </div>

</div>

<button id="secret-btn" onclick="triggerSecretLove()">♥</button>
<div id="secret-overlay" onclick="this.style.display='none'">
    <div id="secret-text">I LOVE YOU<br><span style="font-size: 1rem; color: #fff; text-shadow: 2px 2px 0 #000; animation: blink 1s step-end infinite;">(Click to return)</span></div>
</div>

<script>
    // --- 1. RETRO 8-BIT AUDIO SYNTHESIZER ---
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;

    function play8BitSound(type = 'select') {
        if (!audioCtx) { audioCtx = new AudioContext(); }
        if (audioCtx.state === 'suspended') { audioCtx.resume(); }

        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();

        if (type === 'select') {
            osc.type = 'square'; 
            osc.frequency.setValueAtTime(330, audioCtx.currentTime); 
            osc.frequency.exponentialRampToValueAtTime(660, audioCtx.currentTime + 0.1); 
        } else if (type === 'status') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(700, audioCtx.currentTime + 0.1);
            osc.frequency.linearRampToValueAtTime(300, audioCtx.currentTime + 0.2);
        } else if (type === 'explode') {
            // --- 8-BIT FIREWORK SOUND ---
            // 1. Ascent (Whistle)
            const whistleOsc = audioCtx.createOscillator();
            const whistleGain = audioCtx.createGain();
            whistleOsc.type = 'triangle';
            whistleOsc.frequency.setValueAtTime(400, audioCtx.currentTime);
            whistleOsc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.4);
            
            whistleGain.gain.setValueAtTime(0, audioCtx.currentTime);
            whistleGain.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + 0.2);
            whistleGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.4);
            
            whistleOsc.connect(whistleGain);
            whistleGain.connect(audioCtx.destination);
            whistleOsc.start(audioCtx.currentTime);
            whistleOsc.stop(audioCtx.currentTime + 0.4);

            // 2. Burst (Crackle)
            for (let i = 0; i < 15; i++) {
                let burstOsc = audioCtx.createOscillator();
                let burstGain = audioCtx.createGain();
                burstOsc.type = 'square';
                
                let startTime = audioCtx.currentTime + 0.4 + (Math.random() * 0.1);
                let duration = 0.2 + (Math.random() * 0.3);
                
                burstOsc.frequency.setValueAtTime(200 + Math.random() * 600, startTime);
                burstOsc.frequency.exponentialRampToValueAtTime(50, startTime + duration);
                
                burstGain.gain.setValueAtTime(0, startTime);
                burstGain.gain.linearRampToValueAtTime(0.1, startTime + 0.05);
                burstGain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);

                burstOsc.connect(burstGain);
                burstGain.connect(audioCtx.destination);
                burstOsc.start(startTime);
                burstOsc.stop(startTime + duration);
            }
            return; // exit early since the firework logic handles the nodes
        }

        gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);

        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        osc.start();
        osc.stop(audioCtx.currentTime + 0.2);
    }

    // --- 2. BLOCKY PIXEL EXPLOSION & FLOATING TEXT ---
    function spawnPixels(x, y) {
        const colors = ['#f8d820', '#ff6eb4', '#00ffff']; 
        for (let i = 0; i < 10; i++) {
            let spark = document.createElement('div');
            spark.className = 'pixel-spark';
            spark.style.left = x + 'px';
            spark.style.top = y + 'px';
            spark.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            
            let angle = Math.random() * Math.PI * 2;
            let distance = Math.random() * 60 + 20;
            spark.style.setProperty('--tx', Math.cos(angle) * distance + 'px');
            spark.style.setProperty('--ty', Math.sin(angle) * distance + 'px');
            
            document.body.appendChild(spark);
            setTimeout(() => spark.remove(), 400); 
        }
    }

    function spawnFloatingText(x, y, text, color) {
        let floatText = document.createElement('div');
        floatText.className = 'floating-text';
        floatText.style.left = (x - 20) + 'px';
        floatText.style.top = (y - 20) + 'px';
        floatText.style.color = color;
        floatText.innerText = text;
        
        document.body.appendChild(floatText);
        setTimeout(() => floatText.remove(), 1200);
    }

    // --- 3. JRPG LOGIC & DIALOGUE ---
    const dialoguePool = [
        "It's super sexy!<br>Tumhara petu 🤰",
        "Tiddu used SMILE!<br>Aarav fainted. 😁",
        "Critical Hit!<br>Boobies 😍",
        "Confusion!<br>Cutie ho tum 😘",
        "Tiddu used NAKHRE!<br>It worked! 🤷‍♂️",
        "Item recovered!<br>Tumhara cake tasty hai (dono) 🎂🦵",
        "Tiddu's EXP grew!<br>Achi bachi ho 👧",
        "Aarav's stunned!<br>Pyaari lag rahi ho 💖",
    ];

    const imagePool = [
        "1.jpeg",
        "2.jpeg",
        "3.jpeg",
        "4.jpeg",
        "5.jpeg",
        "6.jpeg",
        "7.jpeg",
        "8.jpeg",
    ];

    const scanResults = [
        "* SCAN COMPLETE:<br>100% bhondu detected.",
        "* SCAN COMPLETE:<br>High levels of Nakhre found.",
        "* SCAN COMPLETE:<br>Warning! Extreme Cuteness.",
        "* SCAN COMPLETE:<br>Requires Kadhai Paneer immediately."
    ];

    let currentImgIndex = 0;

    function executeCommand(action, event) {
        play8BitSound('select');
        spawnPixels(event.clientX, event.clientY);

        const dialogueBox = document.getElementById('dialogue-text');
        const imgElement = document.getElementById('gfPhoto');
        const portraitPanel = document.getElementById('portrait-panel');

        let textToType = "";
        
        // Remove tint when normal commands are used
        imgElement.style.filter = "contrast(1.3) saturate(1.2)";
        document.getElementById('status-text').innerText = "[ NO STATUS ]";
        document.getElementById('status-text').style.color = "var(--text-cyan)";
        document.querySelectorAll('.mood-sprite').forEach(el => el.classList.remove('active'));

        if (action === 'TALK' || action === 'USE_ITEM') {
            textToType = dialoguePool[Math.floor(Math.random() * dialoguePool.length)];
            
            // Cycle through the live images
            currentImgIndex = (currentImgIndex + 1) % imagePool.length;
            imgElement.src = imagePool[currentImgIndex];
            
            // Shake the portrait panel
            portraitPanel.classList.remove('shake');
            void portraitPanel.offsetWidth; 
            portraitPanel.classList.add('shake');

        } else if (action === 'SCAN') {
            textToType = scanResults[Math.floor(Math.random() * scanResults.length)];
        }

        // Typewriter Animation
        dialogueBox.innerHTML = "";
        let i = 0;
        let isTag = false;
        let textBuffer = "";

        clearInterval(window.typeInterval);
        window.typeInterval = setInterval(() => {
            if (i < textToType.length) {
                let char = textToType.charAt(i);
                if (char === '<') isTag = true;
                
                textBuffer += char;
                if (!isTag) dialogueBox.innerHTML = textBuffer;
                
                if (char === '>') {
                    isTag = false;
                    dialogueBox.innerHTML = textBuffer;
                }
                i++;
            } else {
                clearInterval(window.typeInterval);
            }
        }, 30); 
    }

    // --- 4. STATUS EFFECT LOGIC ---
    function setStatus(event, element, label, filterStyle, floatTextStr, textColorCode) {
        play8BitSound('status');
        spawnPixels(event.clientX, event.clientY);
        
        const portraitImg = document.getElementById('gfPhoto');
        const statusText = document.getElementById('status-text');
        const portraitPanel = document.getElementById('portrait-panel');

        // Check if the mood is already active (To toggle it off)
        if (element.classList.contains('active')) {
            element.classList.remove('active');
            statusText.innerText = "[ NO STATUS ]";
            statusText.style.color = "var(--text-cyan)";
            portraitImg.style.filter = "contrast(1.3) saturate(1.2)";
            spawnFloatingText(event.clientX, event.clientY, "-CLEARED", "var(--text-cyan)");
            return;
        }

        // Apply new status
        spawnFloatingText(event.clientX, event.clientY, floatTextStr, textColorCode);
        document.querySelectorAll('.mood-sprite').forEach(el => el.classList.remove('active'));
        element.classList.add('active');
        
        statusText.innerText = `[ ${label} ]`;
        statusText.style.color = textColorCode;
        
        portraitImg.style.filter = `${filterStyle} contrast(1.3) saturate(1.2)`;

        portraitPanel.classList.remove('shake');
        void portraitPanel.offsetWidth; 
        portraitPanel.classList.add('shake');
    }

    // --- 5. SECRET LOVE EXPLOSION ---
    function triggerSecretLove() {
        play8BitSound('explode'); // Play massive firework sound
        
        const overlay = document.getElementById('secret-overlay');
        overlay.style.display = 'flex';
        
        // Shoot 100 giant pixels from the center of the screen
        const centerX = window.innerWidth / 2;
        const centerY = window.innerHeight / 2;
        const colors = ['#ff6eb4', '#ff3333', '#f8d820', '#ffffff'];
        
        for (let i = 0; i < 100; i++) {
            let spark = document.createElement('div');
            spark.className = 'giant-pixel';
            spark.style.left = centerX + 'px';
            spark.style.top = centerY + 'px';
            spark.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            
            let angle = Math.random() * Math.PI * 2;
            let distance = Math.random() * (window.innerWidth / 1.2); 
            spark.style.setProperty('--tx', Math.cos(angle) * distance + 'px');
            spark.style.setProperty('--ty', Math.sin(angle) * distance + 'px');
            
            document.body.appendChild(spark);
            setTimeout(() => spark.remove(), 1500); 
        }
    }

    // --- 6. PLAY TIME COUNTER ---
    const startDate = new Date("December 31, 2024 12:00:00").getTime();
    function updatePlayTime() {
        const now = new Date().getTime();
        const difference = now - startDate;
        const days = Math.floor(difference / (1000 * 60 * 60 * 24));
        const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((difference % (1000 * 60)) / 1000);
        
        const pad = (num) => num.toString().padStart(2, '0');
        
        document.getElementById("time-counter").innerHTML = 
            `${pad(days)}D : ${pad(hours)}H : ${pad(minutes)}M : ${pad(seconds)}S`;
    }
    setInterval(updatePlayTime, 1000);

</script>

</body>
</html>
